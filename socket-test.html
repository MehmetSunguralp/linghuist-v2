<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linghuist - Chat tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-soft: #1f2937;
        --line: #334155;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --green: #10b981;
        --blue: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Roboto', system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, #020617, #0f172a);
        min-height: 100vh;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(300px, 360px) 1fr;
        gap: 12px;
        height: 100vh;
        max-height: 100vh;
        min-height: 0;
        padding: 12px;
        align-items: stretch;
      }
      .side,
      .chat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 100%;
      }
      .side-scroll {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }
      .section {
        padding: 14px 16px;
        border-bottom: 1px solid #1e293b;
      }
      .section:last-child {
        border-bottom: none;
      }
      h1 {
        margin: 0 0 2px;
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .subtitle {
        font-size: 0.75rem;
        color: var(--muted);
        margin: 0;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        margin-top: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }
      .status-pill.online {
        border-color: rgba(16, 185, 129, 0.35);
        color: var(--green);
      }
      .status-pill.offline {
        border-color: rgba(245, 158, 11, 0.35);
        color: #f59e0b;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      label {
        display: block;
        margin: 10px 0 4px;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input,
      textarea,
      button,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #0b1220;
        color: var(--text);
        font-family: inherit;
        font-size: 0.875rem;
      }
      textarea {
        resize: vertical;
        min-height: 72px;
      }
      button {
        cursor: pointer;
        border: none;
        background: var(--blue);
        font-weight: 500;
      }
      button:hover {
        filter: brightness(1.06);
      }
      button.secondary {
        background: #374151;
      }
      button.ghost {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
      }
      button.small {
        width: auto;
        padding: 6px 12px;
        font-size: 0.8125rem;
      }
      button.icon-btn {
        width: 44px;
        min-width: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .auth-tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: #0b1220;
        border-radius: 10px;
        border: 1px solid var(--line);
        margin-bottom: 4px;
      }
      .auth-tabs button {
        flex: 1;
        background: transparent;
        color: var(--muted);
        font-weight: 500;
      }
      .auth-tabs button.active {
        background: var(--panel-soft);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .auth-confirm-wrap {
        display: none;
      }
      .auth-confirm-wrap.show {
        display: block;
      }
      .accordion {
        border-bottom: 1px solid #1e293b;
      }
      .accordion-trigger {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: transparent;
        border: none;
        border-radius: 0;
        color: var(--text);
        font-weight: 600;
        font-size: 0.875rem;
        text-align: left;
        cursor: pointer;
      }
      .accordion-trigger:hover {
        background: rgba(59, 130, 246, 0.06);
      }
      .accordion-chevron {
        font-size: 0.65rem;
        color: var(--muted);
        transition: transform 0.2s ease;
      }
      .accordion.open .accordion-chevron {
        transform: rotate(90deg);
      }
      .accordion-panel {
        display: none;
        padding: 0 16px 16px;
      }
      .accordion.open .accordion-panel {
        display: block;
      }
      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 14px 16px;
        border-bottom: 1px solid #1e293b;
        background: var(--panel-soft);
        flex-shrink: 0;
      }
      .chat-header strong {
        font-size: 1rem;
      }
      .chat-feed-wrap {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: min(620px, calc(100vh - 220px));
      }
      .chat-feed {
        flex: 1 1 auto;
        overflow-y: auto;
        max-height: min(560px, calc(100vh - 260px));
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .empty-chat {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 0.9rem;
        padding: 32px;
        text-align: center;
      }
      .bubble {
        max-width: 78%;
        border-radius: 16px;
        padding: 10px 12px;
        font-size: 0.875rem;
        line-height: 1.45;
        cursor: pointer;
        transition: box-shadow 0.15s ease;
      }
      .bubble:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      .bubble.selected {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }
      .bubble.me {
        align-self: flex-end;
        background: #2563eb;
      }
      .bubble.other {
        align-self: flex-start;
        background: #1e293b;
      }
      .bubble-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .bubble-menu-wrap {
        position: relative;
        margin-left: 8px;
      }
      .bubble-menu-btn {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 0;
        font-size: 14px;
        line-height: 1;
      }
      .bubble-menu {
        position: absolute;
        right: 0;
        top: 30px;
        min-width: 140px;
        background: #0b1220;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 6px;
        display: none;
        z-index: 20;
      }
      .bubble-menu.open {
        display: block;
      }
      .bubble-menu button {
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        padding: 8px;
        border-radius: 8px;
      }
      .bubble-menu button:hover {
        background: #1f2937;
      }
      .bubble-extras {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 0.72rem;
        color: rgba(229, 231, 235, 0.85);
      }
      .bubble.other .bubble-extras {
        border-top-color: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }
      .meta {
        margin-top: 6px;
        font-size: 0.7rem;
        color: rgba(203, 213, 225, 0.95);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .bubble.other .meta {
        color: #cbd5e1;
      }
      .read-icon {
        font-size: 0.75rem;
        letter-spacing: -2px;
        opacity: 0.95;
      }
      .read-icon.pending {
        opacity: 0.65;
      }
      .typing {
        min-height: 20px;
        color: var(--muted);
        font-size: 0.8125rem;
        padding: 0 16px 8px;
        flex-shrink: 0;
      }
      .composer {
        border-top: 1px solid #1e293b;
        padding: 12px 16px;
        background: var(--panel-soft);
        flex-shrink: 0;
      }
      .composer-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: stretch;
      }
      .composer-row input {
        margin: 0;
      }
      .suggestion-banner {
        margin-top: 10px;
        padding: 12px;
        background: #0b1220;
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 0.8125rem;
        display: none;
      }
      .suggestion-banner.show {
        display: block;
      }
      .suggestion-banner .pair {
        margin-top: 8px;
      }
      .suggestion-banner .label {
        font-size: 0.65rem;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .suggestion-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .chats-list {
        max-height: 280px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chat-item {
        border: 1px solid #263043;
        border-radius: 10px;
        padding: 10px 12px;
        background: #0b1220;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .chat-item:hover {
        border-color: #475569;
      }
      .chat-item.active {
        border-color: var(--blue);
        background: #0f1a31;
      }
      .chat-item .title {
        font-size: 0.875rem;
        font-weight: 700;
      }
      .chat-item .sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 4px;
        line-height: 1.35;
      }
      .notifications {
        max-height: 200px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .notification {
        border: 1px solid #263043;
        border-radius: 10px;
        padding: 10px;
        background: #0b1220;
        font-size: 0.8125rem;
      }
      .notification.unread {
        border-color: rgba(16, 185, 129, 0.45);
      }
      .logs {
        max-height: 200px;
        overflow: auto;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 10px;
        white-space: pre-wrap;
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.45;
      }
      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }
        .chat {
          min-height: 420px;
        }
        .chat-feed {
          min-height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="side">
        <div class="section" style="flex-shrink: 0">
          <h1>Linghuist</h1>
          <p class="subtitle">Chat and AI feature testing</p>
          <div id="socketStatus" class="status-pill offline" role="status">
            <span class="status-dot"></span>
            <span>Disconnected</span>
          </div>
        </div>

        <div class="side-scroll">
          <div class="section">
            <div class="auth-tabs" role="tablist">
              <button type="button" id="tabLogin" class="active" data-mode="login">Login</button>
              <button type="button" id="tabSignup" data-mode="signup">Signup</button>
            </div>
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" />
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" />
            <div id="confirmWrap" class="auth-confirm-wrap">
              <label for="confirmPassword">Confirm password</label>
              <input id="confirmPassword" type="password" autocomplete="new-password" />
            </div>
            <button type="button" id="primaryAuthBtn" style="margin-top: 12px">Login</button>
          </div>

          <div class="section">
            <label style="margin-top: 0">Available chats</label>
            <button type="button" id="getChatsBtn" class="secondary" style="margin-top: 8px">Refresh list</button>
            <div id="chatsList" class="chats-list" style="margin-top: 10px"></div>
          </div>

          <div class="accordion" id="accServer">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Server and connection</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <label for="httpBase">HTTP base URL</label>
              <input id="httpBase" value="http://localhost:3000/api" />
              <label for="socketUrl">Socket URL</label>
              <input id="socketUrl" value="http://localhost:3000/api/user" />
              <label for="currentChat">Selected chat</label>
              <input id="currentChat" placeholder="Select from list" readonly />
              <div class="row">
                <button type="button" id="connectBtn">Connect</button>
                <button type="button" id="disconnectBtn" class="secondary">Disconnect</button>
              </div>
            </div>
          </div>

          <div class="accordion" id="accTokens">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Session tokens</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <label for="accessToken">Access token</label>
              <textarea id="accessToken" placeholder="Filled after login"></textarea>
              <label for="refreshToken">Refresh token</label>
              <textarea id="refreshToken"></textarea>
            </div>
          </div>

          <div class="accordion" id="accSuggestLang">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Suggestion languages</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <label for="userLanguageInput">Your language</label>
              <input id="userLanguageInput" value="tr" maxlength="20" />
              <label for="chatLanguageInput">Chat language (optional)</label>
              <input id="chatLanguageInput" value="en" maxlength="20" />
            </div>
          </div>

          <div class="accordion" id="accNotif">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Notifications</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <button type="button" id="getNotificationsBtn" class="secondary">Refresh</button>
              <div id="notificationsList" class="notifications" style="margin-top: 10px"></div>
            </div>
          </div>

          <div class="accordion" id="accProfile">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Profil</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <button type="button" id="getMeBtn" class="secondary">Get profile</button>
            </div>
          </div>

          <div class="accordion" id="accPassword">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Password reset</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <button type="button" id="requestResetBtn" class="secondary">Request reset email</button>
              <button type="button" id="updatePasswordBtn" class="secondary" style="margin-top: 8px">Update password</button>
            </div>
          </div>

          <div class="accordion" id="accLog">
            <button type="button" class="accordion-trigger" aria-expanded="false">
              <span>Logs</span>
              <span class="accordion-chevron">▸</span>
            </button>
            <div class="accordion-panel">
              <div id="logs" class="logs"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="chat">
        <div class="chat-header">
          <div>
            <strong id="chatTitle">Chat</strong>
            <p class="subtitle" id="chatSubtitle">Select a chat from the list</p>
          </div>
        </div>
        <div class="chat-feed-wrap">
          <div id="chatEmpty" class="empty-chat">Messages will appear here after you open a chat.</div>
          <div id="chatFeed" class="chat-feed" hidden></div>
          <div id="typingIndicator" class="typing"></div>
        </div>
        <div class="composer">
          <div class="composer-row">
            <button type="button" id="suggestBtn" class="icon-btn secondary" title="Generate suggestion">💡</button>
            <input id="chatContent" placeholder="Type a message..." disabled />
            <button type="button" id="sendMessageBtn" disabled>Send</button>
          </div>
          <div id="suggestionBanner" class="suggestion-banner">
            <div class="label">Suggested message</div>
            <div id="suggestionForeign"></div>
            <div class="pair">
              <div class="label">Translated version</div>
              <div id="suggestionNative"></div>
            </div>
            <div class="suggestion-actions">
              <button type="button" id="useSuggestionBtn" class="secondary small">Use in input</button>
              <button type="button" id="sendSuggestionBtn" class="small">Send suggestion</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      let socket = null;
      let me = null;
      let activeChatId = '';
      let chatsCache = [];
      let typingSent = false;
      let authMode = 'login';
      let pendingEcho = null;
      let pendingSuggestionTranslation = '';

      const els = {
        httpBase: document.getElementById('httpBase'),
        socketUrl: document.getElementById('socketUrl'),
        currentChat: document.getElementById('currentChat'),
        email: document.getElementById('email'),
        password: document.getElementById('password'),
        confirmPassword: document.getElementById('confirmPassword'),
        confirmWrap: document.getElementById('confirmWrap'),
        accessToken: document.getElementById('accessToken'),
        refreshToken: document.getElementById('refreshToken'),
        chatContent: document.getElementById('chatContent'),
        logs: document.getElementById('logs'),
        socketStatus: document.getElementById('socketStatus'),
        chatFeed: document.getElementById('chatFeed'),
        chatEmpty: document.getElementById('chatEmpty'),
        typingIndicator: document.getElementById('typingIndicator'),
        notificationsList: document.getElementById('notificationsList'),
        chatsList: document.getElementById('chatsList'),
        tabLogin: document.getElementById('tabLogin'),
        tabSignup: document.getElementById('tabSignup'),
        primaryAuthBtn: document.getElementById('primaryAuthBtn'),
        chatTitle: document.getElementById('chatTitle'),
        chatSubtitle: document.getElementById('chatSubtitle'),
        sendMessageBtn: document.getElementById('sendMessageBtn'),
        suggestedBanner: document.getElementById('suggestionBanner'),
        suggestionForeign: document.getElementById('suggestionForeign'),
        suggestionNative: document.getElementById('suggestionNative'),
        suggestBtn: document.getElementById('suggestBtn'),
        userLanguageInput: document.getElementById('userLanguageInput'),
        chatLanguageInput: document.getElementById('chatLanguageInput'),
      };

      function log(kind, detail) {
        const timeStr = new Date().toLocaleTimeString();
        const text = typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2);
        const line = '[' + timeStr + '] ' + kind + '\n' + text + '\n\n';
        els.logs.textContent = line + els.logs.textContent;
      }

      function updateSocketStatus(connected) {
        const pill = els.socketStatus;
        pill.className = 'status-pill ' + (connected ? 'online' : 'offline');
        pill.innerHTML =
          '<span class="status-dot"></span><span>' + (connected ? 'Connected' : 'Disconnected') + '</span>';
      }

      function setAuthMode(mode) {
        authMode = mode;
        els.tabLogin.classList.toggle('active', mode === 'login');
        els.tabSignup.classList.toggle('active', mode === 'signup');
        els.confirmWrap.classList.toggle('show', mode === 'signup');
        els.primaryAuthBtn.textContent = mode === 'login' ? 'Login' : 'Signup';
      }

      els.tabLogin.addEventListener('click', () => setAuthMode('login'));
      els.tabSignup.addEventListener('click', () => setAuthMode('signup'));

      document.querySelectorAll('.accordion').forEach((acc) => {
        const trigger = acc.querySelector('.accordion-trigger');
        trigger.addEventListener('click', () => {
          const open = acc.classList.toggle('open');
          trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      });
      document.addEventListener('click', () => {
        document.querySelectorAll('.bubble-menu.open').forEach((menu) => menu.classList.remove('open'));
      });

      function scrollFeed() {
        els.chatFeed.scrollTop = els.chatFeed.scrollHeight;
      }

      /** Read receipt from DB / socket (`read` may be omitted on some payloads). */
      function messageIsRead(msg) {
        return Boolean(msg && msg.read === true);
      }

      function updateReadIndicators(messageIds) {
        if (!messageIds || !messageIds.length) return;
        messageIds.forEach((id) => {
          const el = els.chatFeed.querySelector('[data-message-id="' + id + '"]');
          if (!el) return;
          const readEl = el.querySelector('[data-read-icon]');
          if (readEl) {
            readEl.textContent = '✓✓';
            readEl.classList.remove('pending');
            readEl.title = 'Read';
          }
        });
      }

      function pushMessageBubble(message, options) {
        options = options || {};
        const isPending = options.pending === true;
        const mine = me && message.senderId && message.senderId === me.id;
        const senderLabel = message.senderName || message.senderId || 'Unknown';
        const safeContent = message.content || '(no content)';
        const div = document.createElement('div');
        div.className = 'bubble ' + (mine ? 'me' : 'other');
        if (message.id && !String(message.id).startsWith('pending-')) {
          div.dataset.messageId = message.id;
        } else if (message.id) {
          div.dataset.pendingId = message.id;
        }

        let readHtml = '';
        if (mine) {
          if (isPending) {
            readHtml = '<span class="read-icon pending" data-read-icon title="Sending">🕐</span>';
          } else if (messageIsRead(message)) {
            readHtml = '<span class="read-icon" data-read-icon title="Read">✓✓</span>';
          } else {
            readHtml = '<span class="read-icon" data-read-icon title="Delivered">✓</span>';
          }
        }

        let extras = '';
        if (message.correctedText) {
          extras += '<div><strong>Correction:</strong> ' + escapeHtml(message.correctedText) + '</div>';
        }
        if (message.translatedText) {
          extras += '<div><strong>Translation:</strong> ' + escapeHtml(message.translatedText) + '</div>';
        }
        if (message.aiSuggestion) {
          extras += '<div><strong>Suggestion:</strong> ' + escapeHtml(message.aiSuggestion) + '</div>';
        }
        const extrasBlock = extras ? '<div class="bubble-extras">' + extras + '</div>' : '';
        const canCorrect =
          !mine &&
          div.dataset.messageId &&
          (!message.correctedText || !String(message.correctedText).trim());
        const actionsHtml = !mine && div.dataset.messageId
          ? '<div class="bubble-menu-wrap">' +
              '<button type="button" class="bubble-menu-btn" title="Message actions">⋯</button>' +
              '<div class="bubble-menu">' +
              '<button type="button" data-action="translate">Translate</button>' +
              (canCorrect ? '<button type="button" data-action="correct">Correct</button>' : '') +
              '</div>' +
            '</div>'
          : '';

        div.innerHTML =
          '<div class="bubble-head"><div>' +
          escapeHtml(safeContent) +
          '</div>' +
          actionsHtml +
          '</div>' +
          extrasBlock +
          '<div class="meta">' +
          '<span>' +
          escapeHtml(senderLabel) +
          ' · ' +
          new Date(message.createdAt || Date.now()).toLocaleTimeString() +
          '</span>' +
          readHtml +
          '</div>';

        const menuBtn = div.querySelector('.bubble-menu-btn');
        const menu = div.querySelector('.bubble-menu');
        if (menuBtn && menu && div.dataset.messageId) {
          menuBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            document.querySelectorAll('.bubble-menu.open').forEach((m) => {
              if (m !== menu) m.classList.remove('open');
            });
            menu.classList.toggle('open');
          });
          menu.querySelectorAll('button[data-action]').forEach((btn) => {
            btn.addEventListener('click', async (event) => {
              event.stopPropagation();
              const action = btn.getAttribute('data-action');
              const messageId = div.dataset.messageId;
              menu.classList.remove('open');
              if (!messageId) return;
              if (action === 'translate') {
                await runTranslateAction(messageId);
              }
              if (action === 'correct') {
                await runCorrectAction(messageId, safeContent);
              }
            });
          });
        }

        els.chatFeed.appendChild(div);
        scrollFeed();
        return div;
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function replacePendingBubble(pendingId, message) {
        const old = els.chatFeed.querySelector('[data-pending-id="' + pendingId + '"]');
        if (old) old.remove();
        pushMessageBubble(message);
      }

      function setTyping(text) {
        els.typingIndicator.textContent = text || '';
      }

      async function api(path, method, body, withAuth) {
        const headers = { 'Content-Type': 'application/json' };
        if (withAuth && els.accessToken.value.trim()) {
          headers.Authorization = 'Bearer ' + els.accessToken.value.trim();
        }
        const response = await fetch(els.httpBase.value.trim() + path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        const json = await response.json().catch(() => ({}));
        log(method + ' ' + path, (json && json.message) || response.status);
        return { response, json };
      }

      async function runTranslateAction(messageId) {
        const targetLanguage =
          window.prompt('Translate to language code (example: tr, en, de):', els.userLanguageInput.value || 'tr') || '';
        if (!targetLanguage.trim()) return;
        const sourceLanguage = window.prompt('Source language code (optional):', '');
        const body = { targetLanguage: targetLanguage.trim() };
        if (sourceLanguage && sourceLanguage.trim()) {
          body.sourceLanguage = sourceLanguage.trim();
        }
        const { json } = await api('/user/chats/messages/' + messageId + '/translate', 'POST', body, true);
        if (json && json.data && activeChatId) {
          await loadChatMessages(activeChatId);
        }
      }

      async function runCorrectAction(messageId, currentText) {
        const correctedText = window.prompt('Corrected text:', currentText || '');
        if (!correctedText || !correctedText.trim()) return;
        const { json } = await api(
          '/user/chats/messages/' + messageId + '/correct',
          'PUT',
          { correctedText: correctedText.trim() },
          true,
        );
        if (json && json.data && activeChatId) {
          await loadChatMessages(activeChatId);
        }
      }

      function bind(id, handler) {
        document.getElementById(id).addEventListener('click', handler);
      }

      async function getMe() {
        const { json } = await api('/user/me', 'GET', null, true);
        if (json && json.data) {
          me = json.data;
          log('Profile', me.username || me.name || me.id);
        }
      }

      async function getNotifications() {
        const { json } = await api('/user/notifications/list?page=1&limit=20', 'GET', null, true);
        const notifications = (json && json.data && json.data.notifications) || [];
        els.notificationsList.innerHTML = '';
        notifications.forEach((n) => {
          const row = document.createElement('div');
          row.className = 'notification ' + (n.read ? '' : 'unread');
          row.innerHTML =
            '<div><strong>' +
            escapeHtml(n.type) +
            '</strong> · ' +
            (n.read ? 'read' : 'unread') +
            '</div>';
          if (!n.read) {
            const btn = document.createElement('button');
            btn.className = 'small';
            btn.style.marginTop = '8px';
            btn.textContent = 'Mark as read';
            btn.addEventListener('click', async () => {
              await api('/user/notifications/' + n.id + '/read', 'PUT', {}, true);
              await getNotifications();
            });
            row.appendChild(btn);
          }
          els.notificationsList.appendChild(row);
        });
      }

      function renderChats(chats) {
        chatsCache = chats;
        els.chatsList.innerHTML = '';
        chats.forEach((chat) => {
          const item = document.createElement('div');
          item.className = 'chat-item' + (activeChatId === chat.chatId ? ' active' : '');
          const lastMessageText = chat.lastMessagePreview || 'No messages yet';
          const lastAt = chat.lastMessageAt ? new Date(chat.lastMessageAt).toLocaleString() : '';
          item.innerHTML =
            '<div class="title">' +
            escapeHtml(chat.interlocutorName || 'User') +
            '</div>' +
            '<div class="sub">' +
            escapeHtml(lastMessageText) +
            (lastAt ? '<br><span style="opacity:.85">' + escapeHtml(lastAt) + '</span>' : '') +
            '</div>';
          item.addEventListener('click', async () => {
            await selectChat(chat.chatId, chat);
          });
          els.chatsList.appendChild(item);
        });
      }

      async function getChats() {
        const { json } = await api('/user/chats/list', 'GET', null, true);
        const chats = (json && json.data && json.data.chats) || [];
        renderChats(chats);
      }

      function getActiveChatMeta() {
        return chatsCache.find((c) => c.chatId === activeChatId) || null;
      }

      function setChatPanelVisible(hasChat) {
        els.chatEmpty.hidden = hasChat;
        els.chatEmpty.style.display = hasChat ? 'none' : 'flex';
        els.chatFeed.hidden = !hasChat;
        els.chatFeed.style.display = hasChat ? 'flex' : 'none';
        els.chatContent.disabled = !hasChat;
        els.sendMessageBtn.disabled = !hasChat;
        els.suggestBtn.disabled = !hasChat;
        if (!hasChat) {
          els.chatTitle.textContent = 'Chat';
          els.chatSubtitle.textContent = 'Select a chat from the list';
        }
      }

      async function loadChatMessages(chatId) {
        const { json } = await api('/user/chats/' + chatId + '/messages', 'GET', null, true);
        const messages = (json && json.data && json.data.messages) || [];
        els.chatFeed.innerHTML = '';
        messages.forEach((m) => pushMessageBubble(m));
      }

      function socketEmit(eventName, payload) {
        if (!socket || !socket.connected) {
          log('Socket', 'Not connected; event was not sent.');
          return;
        }
        socket.emit(eventName, payload);
      }

      function connectSocket() {
        if (socket) {
          socket.disconnect();
        }
        const token = els.accessToken.value.trim();
        socket = io(els.socketUrl.value.trim(), {
          transports: ['websocket'],
          auth: { token },
          extraHeaders: token ? { Authorization: 'Bearer ' + token } : undefined,
        });

        socket.on('connect', () => {
          updateSocketStatus(true);
          log('Socket', 'Connected.');
          if (activeChatId) {
            socketEmit('chat:join', { chatId: activeChatId });
            socketEmit('chat:read', { chatId: activeChatId });
          }
        });
        socket.on('disconnect', (reason) => {
          updateSocketStatus(false);
          setTyping('');
          typingSent = false;
          log('Socket', 'Disconnected: ' + reason);
        });
        socket.on('connect_error', () => log('Socket', 'Connection error. Check token and URLs.'));

        socket.on('presence:updated', () => {});

        socket.on('chat:inbox:updated', () => {
          getChats();
        });

        socket.on('chat:typing', (data) => {
          if (!activeChatId || data.chatId !== activeChatId) return;
          const mine = me && data.userId === me.id;
          if (data.isTyping && !mine) {
            const activeChat = getActiveChatMeta();
            const typingName = (activeChat && activeChat.interlocutorName) || 'Other user';
            setTyping(typingName + ' is typing...');
          } else {
            setTyping('');
          }
        });

        socket.on('chat:message', (data) => {
          if (pendingEcho && me && data.senderId === me.id && data.content === pendingEcho.content) {
            if (pendingEcho.translatedText) {
              data.translatedText = pendingEcho.translatedText;
            }
            replacePendingBubble(pendingEcho.pendingId, data);
            pendingEcho = null;
          } else if (activeChatId && data.chatId === activeChatId) {
            data.senderName =
              data.senderName || (data.senderId === me?.id ? me?.name || me?.username || me?.id : null);
            if (!(pendingEcho && data.senderId === me.id && data.content === pendingEcho.content)) {
              pushMessageBubble(data);
            }
            if (me && data.senderId && data.senderId !== me.id) {
              socketEmit('chat:read', { chatId: activeChatId });
            }
            setTyping('');
          }
          getNotifications();
        });

        socket.on('chat:read', (data) => {
          if (activeChatId && data.chatId === activeChatId) {
            updateReadIndicators(data.messageIds || []);
          }
        });
      }

      async function waitForSocketConnect(timeoutMs) {
        timeoutMs = timeoutMs || 4000;
        if (socket && socket.connected) return true;
        if (!socket) return false;
        return await new Promise((resolve) => {
          let done = false;
          const onConnect = () => {
            if (done) return;
            done = true;
            cleanup();
            resolve(true);
          };
          const onError = () => {
            if (done) return;
            done = true;
            cleanup();
            resolve(false);
          };
          const timer = setTimeout(() => {
            if (done) return;
            done = true;
            cleanup();
            resolve(false);
          }, timeoutMs);
          const cleanup = () => {
            clearTimeout(timer);
            socket.off('connect', onConnect);
            socket.off('connect_error', onError);
          };
          socket.on('connect', onConnect);
          socket.on('connect_error', onError);
        });
      }

      async function ensureSocketConnected() {
        if (!socket || !socket.connected) {
          connectSocket();
        }
        return await waitForSocketConnect();
      }

      async function selectChat(chatId, chatMeta) {
        if (!chatId) return;
        if (activeChatId && activeChatId !== chatId) {
          if (typingSent) {
            socketEmit('chat:typing', { chatId: activeChatId, isTyping: false });
            typingSent = false;
          }
          socketEmit('chat:leave', { chatId: activeChatId });
        }
        activeChatId = chatId;
        els.currentChat.value = chatId;
        setChatPanelVisible(true);
        const meta = chatMeta || getActiveChatMeta();
        els.chatTitle.textContent = meta ? meta.interlocutorName || 'Chat' : 'Chat';
        els.chatSubtitle.textContent = meta ? 'Message history' : 'Chat';
        els.chatFeed.innerHTML = '';
        setTyping('');
        renderChats(chatsCache);
        await loadChatMessages(chatId);
        const connected = await ensureSocketConnected();
        if (!connected) {
          log('Chat', 'Socket connection failed.');
          return;
        }
        socketEmit('chat:join', { chatId });
        socketEmit('chat:read', { chatId });
      }

      els.primaryAuthBtn.addEventListener('click', async () => {
        if (authMode === 'signup') {
          await api(
            '/auth/signup',
            'POST',
            {
              email: els.email.value.trim(),
              password: els.password.value,
              confirmPassword: els.confirmPassword.value,
            },
            false,
          );
        } else {
          const { json } = await api(
            '/auth/login',
            'POST',
            {
              email: els.email.value.trim(),
              password: els.password.value,
            },
            false,
          );
          if (json && json.data) {
            els.accessToken.value = json.data.access_token || '';
            els.refreshToken.value = json.data.refresh_token || '';
            await getMe();
            await getNotifications();
            await getChats();
            const connected = await ensureSocketConnected();
            if (!connected) {
              log('Socket', 'Could not connect after login. Use Server and connection, then Connect.');
            } else {
              log('Login', 'Success. Socket is connected; list and read receipts update in real time.');
            }
          }
        }
      });

      bind('requestResetBtn', async () => {
        await api('/auth/request-password-reset', 'POST', { email: els.email.value.trim() }, false);
      });

      bind('updatePasswordBtn', async () => {
        await api(
          '/auth/update-password',
          'POST',
          {
            accessToken: els.accessToken.value.trim(),
            refreshToken: els.refreshToken.value.trim(),
            newPassword: els.password.value,
          },
          false,
        );
      });

      bind('connectBtn', async () => {
        const connected = await ensureSocketConnected();
        if (!connected) log('Socket', 'Connection failed.');
      });

      bind('disconnectBtn', () => {
        if (socket) socket.disconnect();
      });

      bind('sendMessageBtn', async () => {
        const content = els.chatContent.value.trim();
        if (!content || !activeChatId) return;
        const connected = await ensureSocketConnected();
        if (!connected) {
          log('Message', 'Socket is not connected.');
          return;
        }
        const pendingId = 'pending-' + Date.now();
        const translatedText =
          els.suggestedBanner.classList.contains('show') && els.suggestionForeign.textContent.trim() === content
            ? pendingSuggestionTranslation
            : '';
        pendingEcho = { content, pendingId, translatedText };
        pushMessageBubble(
          {
            id: pendingId,
            chatId: activeChatId,
            senderId: me?.id,
            senderName: me?.name || me?.username,
            content,
            createdAt: new Date().toISOString(),
            read: false,
            translatedText: translatedText || null,
          },
          { pending: true },
        );
        socketEmit('chat:join', { chatId: activeChatId });
        socketEmit('chat:message', {
          chatId: activeChatId,
          content: content,
        });
        els.chatContent.value = '';
        els.suggestedBanner.classList.remove('show');
        pendingSuggestionTranslation = '';
        if (typingSent) {
          socketEmit('chat:typing', { chatId: activeChatId, isTyping: false });
          typingSent = false;
        }
      });

      els.chatContent.addEventListener('input', () => {
        if (!activeChatId || !socket || !socket.connected) return;
        const hasContent = els.chatContent.value.trim().length > 0;
        if (hasContent && !typingSent) {
          socketEmit('chat:typing', { chatId: activeChatId, isTyping: true });
          typingSent = true;
        }
        if (!hasContent && typingSent) {
          socketEmit('chat:typing', { chatId: activeChatId, isTyping: false });
          typingSent = false;
        }
      });

      bind('getMeBtn', getMe);
      bind('getNotificationsBtn', getNotifications);
      bind('getChatsBtn', getChats);

      bind('suggestBtn', async () => {
        if (!activeChatId) return;
        const body = {
          userLanguage: els.userLanguageInput.value.trim() || 'tr',
        };
        const cl = els.chatLanguageInput.value.trim();
        if (cl) body.chatLanguage = cl;
        const { json } = await api('/user/chats/' + activeChatId + '/suggestion', 'POST', body, true);
        if (json && json.data) {
          els.suggestionForeign.textContent = json.data.suggestion || '';
          els.suggestionNative.textContent = json.data.translatedSuggestion || '';
          els.suggestedBanner.classList.add('show');
          pendingSuggestionTranslation = json.data.translatedSuggestion || '';
        }
      });

      document.getElementById('useSuggestionBtn').addEventListener('click', () => {
        els.chatContent.value = els.suggestionForeign.textContent || '';
      });

      document.getElementById('sendSuggestionBtn').addEventListener('click', async () => {
        const t = els.suggestionForeign.textContent.trim();
        if (!t) return;
        els.chatContent.value = t;
        document.getElementById('sendMessageBtn').click();
      });

      setAuthMode('login');
      setChatPanelVisible(false);
    </script>
  </body>
</html>
